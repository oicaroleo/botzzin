version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botzzin
      POSTGRES_PASSWORD: botzzin
      POSTGRES_DB: botzzin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botzzin"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot-webhook:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      BOT_MODE: server
      DATABASE_URL: postgresql://botzzin:botzzin@postgres:5432/botzzin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key
      TELEGRAM_WEBHOOK_URL: http://localhost:8080
    ports:
      - "3001:3001"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      BOT_MODE: worker
      BOT_ID: your-bot-id-1
      DATABASE_URL: postgresql://botzzin:botzzin@postgres:5432/botzzin
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
